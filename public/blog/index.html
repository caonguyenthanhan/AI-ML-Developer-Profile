<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Bài viết</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        mono: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        blood: '#ff2a2a',
                        darkness: '#0a0a0a',
                        ash: '#2a2a2a',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d1d5db;
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(255, 42, 42, 0.7);
        }
    </style>
</head>
<body class="font-serif antialiased leading-relaxed selection:bg-blood selection:text-white">
    <header class="py-14 text-center border-b border-ash">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-4">Blog</h1>
            <p class="text-gray-400">Danh sách các bài viết HTML để chia sẻ</p>
            <div class="h-1 w-20 bg-blood mx-auto mt-6"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 gap-6">
            <div class="border border-gray-700 rounded-lg p-6 hover:border-blood transition-colors duration-300">
                <a href="/blog/Dance-of-the-Strings" class="block">
                    <h2 class="text-2xl font-bold text-white mb-2">Vũ Điệu Của Những Sợi Dây</h2>
                    <p class="text-gray-400">Bài luận hiện sinh về AI và những sợi dây vô hình.</p>
                </a>
                <div class="mt-4 flex gap-3">
                    <a href="/blog/Dance-of-the-Strings" class="inline-flex items-center justify-center px-4 py-2 rounded-lg border border-gray-700 text-gray-200 font-mono text-xs hover:border-gray-500 transition-colors">Đọc bài</a>
                    <a href="/blog/Dance-of-the-Strings/interact" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-red-600 text-white font-mono text-xs hover:bg-red-500 transition-colors">Tương tác</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-ash py-8 mt-12 text-center text-gray-600 text-sm font-mono">
        <p>SYSTEM.OUT.PRINT("BLOG INDEX");</p>
    </footer>
</body>
</html>
