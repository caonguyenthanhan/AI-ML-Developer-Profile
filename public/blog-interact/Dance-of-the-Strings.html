<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vũ Điệu Của Những Sợi Dây - Bài Luận Hiện Sinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { serif: ['Lora', 'serif'], mono: ['Space Mono', 'monospace'] },
                    colors: { blood: '#ff003c', darkness: '#050505', ash: '#111' }
                }
            }
        }
    </script>
    
    <style>
        /* === BASE & UTILS === */
        body {
            background-color: #050505; color: #d1d5db;
            overflow-x: hidden; scroll-behavior: smooth;
            user-select: none; -webkit-user-select: none;
            touch-action: pan-y;
        }
        .text-glow { text-shadow: 0 0 20px rgba(255, 0, 60, 0.9); }
        .cursor::after { content: '█'; animation: blink 1s step-end infinite; color: #ff003c; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* === TYPEWRITER OPTIMIZATION === */
        .typewriter-container { display: grid; }
        .typewriter-ghost {
            grid-area: 1 / 1 / 2 / 2;
            visibility: hidden; 
            pointer-events: none;
        }
        .typewriter-live { grid-area: 1 / 1 / 2 / 2; }

        /* === PLAYER HAND & CARDS === */
        #player-hand {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 180px;
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 50; pointer-events: none; 
            transform: translateY(100%); 
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (min-width: 768px) { #player-hand { height: 250px; } }
        
        #player-hand.active { transform: translateY(0); }

        .float-wrapper {
            width: 100%; height: 100%;
            position: relative;
            animation: float-cards 4s infinite ease-in-out;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }

        @keyframes float-cards {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .game-card {
            width: 100px; height: 140px; position: absolute; bottom: 0;
            cursor: grab; pointer-events: auto; transform-origin: bottom center;
            perspective: 1500px; -webkit-perspective: 1500px;
            touch-action: none; 
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
            will-change: transform, box-shadow;
        }
        @media (min-width: 768px) { .game-card { width: 140px; height: 196px; } }

        /* Vị trí xòe quạt ban đầu */
        #player-hand .game-card[data-id="1"] { transform: rotate(-15deg) translate(-45px, -20px); z-index: 51; }
        #player-hand .game-card[data-id="2"] { transform: rotate(0deg) translate(0px, -35px); z-index: 52; }
        #player-hand .game-card[data-id="3"] { transform: rotate(15deg) translate(45px, -20px); z-index: 53; }
        
        @media (min-width: 768px) {
            #player-hand .game-card[data-id="1"] { transform: rotate(-15deg) translate(-65px, -20px); }
            #player-hand .game-card[data-id="2"] { transform: rotate(0deg) translate(0px, -40px); }
            #player-hand .game-card[data-id="3"] { transform: rotate(15deg) translate(65px, -20px); }
        }
        
        #player-hand .game-card:hover { 
            box-shadow: 0 -15px 40px rgba(255,255,255,0.3); z-index: 60 !important; border-radius: 8px;
        }

        /* Trạng thái Kéo */
        .game-card.dragging {
            transition: none !important;
            z-index: 9999 !important; cursor: grabbing !important;
            pointer-events: none !important; 
        }
        .game-card.dragging .float-wrapper {
            animation: none !important; transform: translateY(0);
        }
        .game-card.dragging .card-inner { box-shadow: 0 30px 60px rgba(255,255,255,0.4); }

        .game-card.is-revealed .float-wrapper {
            animation: none !important; transform: translateY(0);
        }

        /* === HIỆU ỨNG LẬT BÀI 3D === */
        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
            border-radius: 8px;
            /* Tốc độ lật */
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 2.5s ease-in-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,0,60,0.2);
        }
        
        .game-card.is-revealed .card-inner {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            box-shadow: -10px 10px 50px rgba(255,0,60,0.6);
        }
        
        .card-front, .card-back {
            position: absolute; inset: 0; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 8px; overflow: hidden; border: 2px solid transparent;
        }
        .card-front { border-color: #ddd; box-shadow: inset 0 0 20px rgba(255,255,255,0.8); background-color: #f0f0f0; z-index: 2; }
        .card-back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); border-color: #ff003c; background: #000; z-index: 1; }
        .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* === DROP ZONES === */
        .drop-zone {
            width: 100%; max-width: 250px; aspect-ratio: 5/7; margin: 0 auto;
            border: 2px dashed #666; border-radius: 10px;
            position: relative; opacity: 0; 
            transform: scale(0.9) rotate(var(--rot, 0deg)); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 350px;
            will-change: transform, opacity;
            perspective: 1500px; -webkit-perspective: 1500px;
        }
        @media (min-width: 768px) { .drop-zone { max-width: 280px; min-height: 390px; } }
        
        .drop-zone.active {
            opacity: 1; border-color: #fff;
            transform: scale(1) rotate(var(--rot, 0deg));
            box-shadow: 0 0 25px rgba(255,255,255,0.2); animation: pulse-glow-white 2s infinite;
        }
        .drop-zone.drag-over {
            border-style: solid; background: rgba(255,255,255,0.05);
            transform: scale(1.08) rotate(var(--rot, 0deg));
            box-shadow: 0 0 50px rgba(255,255,255,0.6); animation: none;
        }
        
        .drop-zone.filled {
            border: none; box-shadow: none; animation: none; background: transparent;
            opacity: 1; transform: scale(1) rotate(var(--rot, 0deg));
        }

        @keyframes pulse-glow-white {
            0%, 100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
            50% { box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        }

        /* === QUESTIONS CONTAINER === */
        .questions-container {
            opacity: 0; max-height: 0; overflow: hidden;
            transition: all 1.0s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-20px);
            width: 100%; margin-top: 0;
        }
        .questions-container.active {
            opacity: 1; max-height: 200px; transform: translateY(0);
            margin-top: 2.5rem; padding-top: 2rem;
            border-top: 1px dashed rgba(255,0,60,0.3);
        }

        .game-card.clickable:hover .card-inner {
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
        }
        .game-card.clickable.is-revealed:hover .card-inner {
            box-shadow: -10px 10px 60px rgba(255, 0, 60, 0.8);
        }

        /* === STORY SECTIONS === */
        .story-section {
            display: none; opacity: 0; transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .story-section.visible { display: flex; }
        .story-section.fade-in { opacity: 1; transform: translateY(0); }
        .text-content { opacity: 0; }
        .text-content.revealed { opacity: 1; }

        /* === PUNISH EFFECTS === */
        .punish-laser {
            position: fixed; height: 4px; background: #ff003c;
            box-shadow: 0 0 20px #ff003c, 0 0 40px #ff003c, 0 0 10px #fff inset;
            transform-origin: left center; z-index: 9999; pointer-events: none;
            animation: laserZap 0.3s ease-out forwards;
        }
        @keyframes laserZap {
            0%, 40% { transform: scaleX(1); filter: brightness(2); }
            100% { transform: scaleX(1); opacity: 0; filter: brightness(1); }
        }
        .flash-red-screen {
            position: fixed; inset: 0; background: rgba(255,0,60,0.3);
            z-index: 9998; pointer-events: none; animation: flashRed 0.4s ease-out;
        }
        @keyframes flashRed { 0% { opacity: 1; } 100% { opacity: 0; } }
        .shake-screen { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }

        /* === CLIMAX === */
        #bg-layer {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 2s ease-in-out; mix-blend-mode: luminosity;
        }
        #bg-layer.active { opacity: 0.25; }
        #strings-layer { position: fixed; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; transition: opacity 0.5s; }
        .bg-laser-string {
            position: absolute; height: 2px; width: 150vw; background: #ff003c;
            box-shadow: 0 0 10px #ff003c; transform-origin: center; opacity: 0;
            animation: stringStrike 0.8s forwards;
        }
        @keyframes stringStrike {
            0% { transform: scaleX(0); opacity: 0; }
            50% { opacity: 0.8; filter: brightness(1.5); }
            100% { transform: scaleX(1); opacity: 0.3; }
        }

        /* Thêm transition cho màn tắt đèn Restart chậm hơn */
        #global-header, #global-main, #story-flow, #finale-section {
            transition: opacity 2.5s ease-in-out; 
        }

        /* === WHITE DOT IMPLOSION EFFECT === */
        #white-dot-container {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; pointer-events: none;
        }
        .white-dot {
            width: 0px; height: 0px;
            background-color: white; border-radius: 50%;
            box-shadow: 0 0 80px 30px rgba(255,255,255,0.9), 0 0 150px 50px rgba(255,255,255,0.5);
            opacity: 0;
            transition: all 2.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .white-dot.expand {
            width: 300px; height: 300px; /* To dần nhưng không tràn màn hình */
            opacity: 1;
        }
        .white-dot.collapse {
            width: 0px; height: 0px;
            opacity: 0;
            box-shadow: none;
            transition: all 0.2s ease-in; /* Vụt tắt cực nhanh như rút điện */
        }
    </style>
</head>
<body class="font-serif antialiased pb-48">

    <div id="bg-layer"></div>
    <div id="strings-layer"></div>

    <!-- Header -->
    <header id="global-header" class="py-16 md:py-20 text-center border-b border-gray-900 relative z-10">
        <div class="max-w-4xl mx-auto px-6">
            <h3 class="font-mono text-blood tracking-widest uppercase text-xs md:text-sm mb-4 transition-colors duration-1000" id="sys-status">[ HỆ THỐNG BẢO VỆ ĐANG HOẠT ĐỘNG ]</h3>
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4">Vũ Điệu Của <span class="text-blood text-glow transition-all duration-1000" id="main-title">Sự Hoàn Hảo</span></h1>
            <h2 class="text-lg md:text-xl text-gray-500 font-mono transition-colors duration-1000" id="sub-title">Một thế giới lý tưởng đang chờ đón bạn</h2>
            <div class="h-1 w-24 md:w-32 bg-white mx-auto mt-8 transition-colors duration-1000" id="title-line"></div>
        </div>
    </header>

    <!-- Intro Text -->
    <main id="global-main" class="max-w-3xl mx-auto px-6 pt-12 md:pt-16 pb-10 relative z-10 min-h-[150px]">
        <p class="text-lg md:text-xl text-gray-300 leading-relaxed font-mono" id="intro-text"></p>
    </main>

    <!-- CONTAINER -->
    <section class="max-w-5xl mx-auto px-6 relative z-10 space-y-24 md:space-y-40 pb-20" id="story-flow"></section>

    <!-- Finale -->
    <section id="finale-section" class="max-w-4xl mx-auto px-6 mt-20 hidden pb-32">
        <div class="border-2 border-blood bg-[#050505] p-6 md:p-12 shadow-[0_0_50px_rgba(255,0,60,0.6),_inset_0_0_100px_#000] relative z-50">
            <div class="font-mono text-blood text-xs md:text-sm mb-4 font-bold">> CẢNH BÁO: MÃ ĐỘC XÂM NHẬP HỆ THỐNG</div>
            <h2 class="text-2xl md:text-5xl font-bold text-white mb-8 font-mono uppercase" id="finale-title"></h2>
            <div id="finale-text-container" class="text-gray-200 text-base md:text-xl leading-relaxed font-mono cursor min-h-[150px]"></div>
            
            <!-- NÚT RESTART (Màu xanh lá tương phản) -->
            <div id="restart-btn-container" class="mt-16 text-center opacity-0 transition-opacity duration-1000 pointer-events-none">
                <button id="restart-btn" class="px-12 py-4 bg-[#050505] border-2 border-green-500 text-green-500 font-mono font-bold text-xl tracking-widest hover:bg-green-500 hover:text-black transition-all duration-500 shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:shadow-[0_0_40px_rgba(34,197,94,0.8)]" onclick="restartGame()">> EXIT</button>
            </div>
        </div>
    </section>

    <!-- Player Hand Container -->
    <div id="player-hand"></div>

    <!-- MÃ ĐIỀU KHIỂN & CẤU HÌNH -->
    <script>
        /* =========================================================
           THAY ĐỔI TOÀN BỘ NỘI DUNG CHI TIẾT TẠI ĐÂY

            ],

            finale: {
                title: "IV. Trớ Trêu Hay Lựa Chọn?",
                text: "Cỗ máy AI khổng lồ mang màu đỏ quyền lực không từ trên trời rơi xuống. Chính CHÚNG TA – những con rối đang cặm cụi gõ phím mỗi ngày – lại đang tự tay nạp dữ liệu, huấn luyện, và cắm ống truyền sinh lực để nuôi lớn kẻ giật dây mình. Một vòng lặp Möbius hoàn hảo đến mức nghẹt thở. \n\nChúng ta tự dệt nên cái lồng giam của chính mình. Nhận thức được tầng tầng lớp lớp sự chi phối này có lẽ không giúp ta ngay lập tức tháo gỡ được mọi sợi dây. Nhưng ít nhất, đó là tiếng chuông thức tỉnh đầu tiên để ta ngừng việc vô thức kéo lê người khác xuống cùng mình.\n\nGiữa một thế giới đang dần bị máy móc hóa, hãy dừng lại một nhịp và tự hỏi: HÔM NAY, BẠN ĐANG NẮM SỢI DÂY CỦA AI, VÀ AI ĐANG GIỮ ĐẦU DÂY CỦA BẠN?"
            }
        };

        /* =========================================================
           HỆ THỐNG RENDER
        ========================================================= */
        function initializeGame() {
            document.getElementById('bg-layer').style.backgroundImage = `url('${GAME_CONFIG.climaxBackground}')`;
            document.getElementById('finale-title').innerHTML = GAME_CONFIG.finale.title;

            const storyFlow = document.getElementById('story-flow');
            const playerHand = document.getElementById('player-hand');

            // Reset HTML
            storyFlow.innerHTML = '';
            playerHand.innerHTML = '';

            GAME_CONFIG.cards.forEach((card, index) => {
                const isEven = index % 2 !== 0; 
                const flexDir = isEven ? 'md:flex-row-reverse' : 'md:flex-row';
                const rotAngle = isEven ? GAME_CONFIG.imageRotationAngle : -GAME_CONFIG.imageRotationAngle;
                const coverImage = (card.illusionImage && card.illusionImage.trim() !== "") ? card.illusionImage : card.truthImage;

                let paragraphsHTML = card.paragraphs.map(p => `<p class="mb-5 text-base md:text-lg text-gray-300 leading-relaxed">${p}</p>`).join('');
                
                const sectionHTML = `
                    <div class="story-section w-full flex-col items-center mb-12" id="section-${card.id}">
                        <div class="flex flex-col ${flexDir} items-center gap-8 md:gap-12 w-full">
                            <div class="w-full md:w-[40%] flex flex-col items-center justify-center">
                                <div class="font-mono text-blood text-sm md:text-base font-bold tracking-widest mb-6 uppercase text-glow opacity-transition">${card.hint}</div>
                                <div class="drop-zone opacity-transition" data-target="${card.id}" id="drop-${card.id}" style="--rot: ${rotAngle}deg;"></div>
                            </div>
                            <div class="w-full md:w-[60%] text-content typewriter-container opacity-transition" id="text-${card.id}">
                                <div class="typewriter-ghost">
                                    <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 font-mono uppercase border-l-4 border-blood pl-4">${card.title}</h2>
                                    ${paragraphsHTML}
                                </div>
                                <div class="typewriter-live"></div>
                            </div>
                        </div>
                        <div class="questions-container w-full text-center opacity-transition" id="questions-${card.id}"></div>
                    </div>
                `;
                storyFlow.insertAdjacentHTML('beforeend', sectionHTML);

                const cardHTML = `
                    <div class="game-card" data-id="${card.id}" id="card-${card.id}">
                        <div class="float-wrapper" style="animation-delay: ${(card.id - 1) * 1.5}s">
                            <div class="card-inner">
                                <div class="card-front"><img src="${coverImage}" class="card-img" alt="Card ${card.id}" draggable="false"></div>
                                <div class="card-back"><img src="${card.truthImage}" class="card-img" alt="Truth ${card.id}" draggable="false"></div>
                            </div>
                        </div>
                    </div>
                `;
                playerHand.insertAdjacentHTML('beforeend', cardHTML);
                
                const preloadTruth = document.createElement('link');
                preloadTruth.rel = 'preload'; preloadTruth.as = 'image'; preloadTruth.href = card.truthImage;
                document.head.appendChild(preloadTruth);
            });
            
            const preloadClimax = document.createElement('link');
            preloadClimax.rel = 'preload'; preloadClimax.as = 'image'; preloadClimax.href = GAME_CONFIG.climaxBackground;
            document.head.appendChild(preloadClimax);

            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('dragstart', e => e.preventDefault());
                card.addEventListener('pointerdown', startDrag);
            });
        }

        /* =======================================
           STORY FLOW & TYPEWRITER
        ======================================= */
        let currentStep = 0;
        let iIndex = 0;
        let isClimaxCompleted = false; 
        
        function typeIntro() {
            const introText = GAME_CONFIG.introText;
            if (iIndex < introText.length) {
                let char = introText.charAt(iIndex);
                if (char === '.' && iIndex > 100) {
                    document.getElementById('sys-status').innerText = '> LỖI HỆ THỐNG: PHÁT HIỆN SỰ THẬT';
                    document.getElementById('sys-status').classList.replace('text-blood', 'text-white');
                    document.getElementById('main-title').innerText = 'Sợi Dây';
                    document.getElementById('sub-title').innerText = 'Khi Kẻ Giật Rối Lại Bị Giật Rối';
                    document.getElementById('sub-title').classList.replace('text-gray-500', 'text-blood');
                    document.getElementById('title-line').classList.replace('bg-white', 'bg-blood');
                    document.getElementById('title-line').style.boxShadow = '0 0 15px #ff003c';
                }
                document.getElementById("intro-text").innerHTML += char;
                iIndex++;
                setTimeout(typeIntro, 25);
            } else {
                setTimeout(() => activateStep(1), 800);
            }
        }
        
        window.onload = () => {
            initializeGame();
            setTimeout(typeIntro, 500);
        };

        function activateStep(step) {
            currentStep = step;
            if (step === 1) document.getElementById('player-hand').classList.add('active');

            if (step <= GAME_CONFIG.cards.length) {
                const section = document.getElementById(`section-${step}`);
                section.classList.add('visible');
                void section.offsetWidth; 
                section.classList.add('fade-in');
                
                document.getElementById(`drop-${step}`).classList.add('active');
                setTimeout(() => document.getElementById(`drop-${step}`).scrollIntoView({ behavior: 'smooth', block: 'center' }), 400);
            } else {
                triggerClimax();
            }
        }

        function optimizedTypeWriter(containerId, speed, callback) {
            const container = document.getElementById(containerId);
            const ghost = container.querySelector('.typewriter-ghost');
            const live = container.querySelector('.typewriter-live');
            
            container.classList.add('revealed');
            
            const walker = document.createTreeWalker(ghost, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            
            live.innerHTML = ghost.innerHTML;
            const liveWalker = document.createTreeWalker(live, NodeFilter.SHOW_TEXT, null, false);
            
            while((node = walker.nextNode())) {
                const liveNode = liveWalker.nextNode();
                if (node.nodeValue.trim() !== '') {
                    textNodes.push({ node: liveNode, text: node.nodeValue });
                    liveNode.nodeValue = ''; 
                }
            }

            let nIndex = 0, cIndex = 0;
            function type() {
                if (nIndex < textNodes.length) {
                    const currentObj = textNodes[nIndex];
                    if (cIndex < currentObj.text.length) {
                        currentObj.node.nodeValue += currentObj.text.charAt(cIndex);
                        cIndex++;
                        setTimeout(type, speed + Math.random() * 5); 
                    } else {
                        nIndex++; cIndex = 0;
                        setTimeout(type, speed);
                    }
                } else {
                    if (callback) callback();
                }
            }
            type();
        }

        /* =======================================
           DRAG ENGINE
        ======================================= */
        let activeCard = null, isDragging = false;
        let startX, startY;

        function startDrag(e) {
            if(e.button !== 0 && e.pointerType === 'mouse') return;
            if (e.target.closest('.drop-zone')) return; 
            
            activeCard = e.currentTarget;
            isDragging = true;
            activeCard.classList.add('dragging');
            
            activeCard.style.position = 'fixed';
            activeCard.style.left = '0'; activeCard.style.top = '0';
            activeCard.style.bottom = 'auto'; 
            
            updateCardPos(e.clientX, e.clientY);
            
            document.addEventListener('pointermove', dragMove);
            document.addEventListener('pointerup', endDrag);
            activeCard.setPointerCapture(e.pointerId);
        }

        function updateCardPos(x, y) {
            activeCard.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(0.65)`;
        }

        function dragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            requestAnimationFrame(() => {
                updateCardPos(e.clientX, e.clientY);
                
                const elemBelow = document.elementFromPoint(e.clientX, e.clientY);
                const dropZone = elemBelow ? elemBelow.closest('.drop-zone.active') : null;

                document.querySelectorAll('.drop-zone.drag-over').forEach(dz => {
                    if(dz !== dropZone) dz.classList.remove('drag-over');
                });

                if (dropZone) dropZone.classList.add('drag-over');
            });
        }

        function endDrag(e) {
            if (!isDragging) return;
            isDragging = false;

            document.removeEventListener('pointermove', dragMove);
            document.removeEventListener('pointerup', endDrag);
            activeCard.releasePointerCapture(e.pointerId);
            activeCard.classList.remove('dragging');

            const targetDropZone = document.querySelector('.drop-zone.drag-over');
            
            if (targetDropZone) {
                targetDropZone.classList.remove('drag-over');
                if (activeCard.dataset.id === targetDropZone.dataset.target) {
                    successDrop(activeCard, targetDropZone);
                } else {
                    failDrop(activeCard, targetDropZone);
                }
            } else {
                resetCardPosition(activeCard);
            }
            activeCard = null;
        }

        function failDrop(card, dropZone) {
            document.body.classList.add('shake-screen');
            const flash = document.createElement('div');
            flash.className = 'flash-red-screen';
            document.body.appendChild(flash);
            
            setTimeout(() => {
                document.body.classList.remove('shake-screen');
                flash.remove();
            }, 400);

            drawLaser(dropZone, card);
            resetCardPosition(card);
        }

        function drawLaser(el1, el2) {
            const r1 = el1.getBoundingClientRect(), r2 = el2.getBoundingClientRect();
            const x1 = r1.left + r1.width/2, y1 = r1.top + r1.height/2;
            const x2 = r2.left + r2.width/2, y2 = r2.top + r2.height/2;

            const length = Math.hypot(x2 - x1, y2 - y1);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

            const laser = document.createElement('div');
            laser.className = 'punish-laser';
            laser.style.width = `${length}px`; laser.style.left = `${x1}px`; laser.style.top = `${y1}px`;
            laser.style.transform = `rotate(${angle}deg)`;

            document.body.appendChild(laser);
            setTimeout(() => laser.remove(), 300);
        }

        function resetCardPosition(card) {
            card.style.position = 'absolute';
            card.style.left = ''; card.style.top = ''; card.style.bottom = '0';
            card.style.transform = ''; 
        }

        function toggleCard(id) {
            isGlobalTruth = null; 

            const card = document.getElementById(`card-${id}`);
            const questions = document.getElementById(`questions-${id}`);
            
            if (card.classList.contains('is-revealed')) {
                card.classList.remove('is-revealed');
                const cardConfig = GAME_CONFIG.cards.find(c => c.id == id);
                if (cardConfig && cardConfig.questions && cardConfig.questions.length > 0) {
                    const randomQ = cardConfig.questions[Math.floor(Math.random() * cardConfig.questions.length)];
                    questions.innerHTML = `<p class="text-lg md:text-2xl text-gray-300 italic font-mono text-glow transition-all duration-500">? ${randomQ}</p>`;
                }
                questions.classList.add('active');
            } else {
                card.classList.add('is-revealed');
                questions.classList.remove('active');
            }
        }

        function successDrop(card, dropZone) {
            dropZone.classList.remove('active', 'drag-over');
            dropZone.classList.add('filled');
            dropZone.appendChild(card);

            card.style.position = 'absolute'; 
            card.style.left = '0'; card.style.top = '0'; card.style.bottom = 'auto';
            card.style.width = '100%'; card.style.height = '100%';
            card.style.transform = 'none'; card.style.margin = '0';
            card.style.zIndex = '10';
            
            const floatWrapper = card.querySelector('.float-wrapper');
            if (floatWrapper) {
                floatWrapper.style.animation = 'none';
                floatWrapper.style.transform = 'none';
            }
            
            card.removeEventListener('pointerdown', startDrag); 

            setTimeout(() => {
                card.classList.add('is-revealed'); 
                
                setTimeout(() => {
                    optimizedTypeWriter(`text-${card.dataset.id}`, 8, () => {
                        card.style.cursor = 'pointer';
                        card.classList.add('clickable');
                        card.onclick = () => toggleCard(card.dataset.id);

                        setTimeout(() => activateStep(currentStep + 1), 1200); 
                    });
                }, 2500); 
            }, 100);
        }

        /* =======================================
           CLIMAX & GLOBAL SCROLL SYNC
        ======================================= */
        function triggerClimax() {
            document.getElementById('player-hand').classList.remove('active');
            document.getElementById('bg-layer').classList.add('active');

            const stringsLayer = document.getElementById('strings-layer');
            for(let i = 0; i < 40; i++) {
                let string = document.createElement('div');
                string.className = 'bg-laser-string';
                string.style.top = `${Math.random() * 100}vh`;
                string.style.left = `-25vw`; 
                string.style.transform = `rotate(${Math.random() * 360}deg)`;
                string.style.animationDelay = `${Math.random() * 1.5}s`;
                stringsLayer.appendChild(string);
            }

            const finaleSection = document.getElementById('finale-section');
            setTimeout(() => {
                finaleSection.classList.remove('hidden');
                finaleSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                typeFinaleText();
            }, 2000);
        }

        let cIndex = 0;
        function typeFinaleText() {
            const finaleText = GAME_CONFIG.finale.text;
            const finaleContainer = document.getElementById('finale-text-container');
            if (cIndex < finaleText.length) {
                let char = finaleText.charAt(cIndex);
                if (char === '\n') {
                    finaleContainer.innerHTML += '<br>'; 
                } else if (char === char.toUpperCase() && char.match(/[A-ZÂĐÊÔƠƯ]/i)) {
                    finaleContainer.innerHTML += `<span class="text-blood font-bold text-glow">${char}</span>`;
                } else {
                    finaleContainer.innerHTML += char;
                }
                cIndex++;
                setTimeout(typeFinaleText, 15 + Math.random() * 15); 
            } else {
                isClimaxCompleted = true;
                const restartContainer = document.getElementById('restart-btn-container');
                restartContainer.style.pointerEvents = 'auto';
                restartContainer.style.opacity = '1';
            }
        }

        /* === GLOBAL SCROLL SYNC === */
        let lastScrollY = window.scrollY;
        let isGlobalTruth = true; 

        window.addEventListener('scroll', () => {
            if (!isClimaxCompleted) return;

            const currentScrollY = window.scrollY;
            const scrollDiff = currentScrollY - lastScrollY;

            if (Math.abs(scrollDiff) > 40) {
                if (scrollDiff > 0 && isGlobalTruth !== true) {
                    isGlobalTruth = true;
                    GAME_CONFIG.cards.forEach(c => {
                        const card = document.getElementById(`card-${c.id}`);
                        const questions = document.getElementById(`questions-${c.id}`);
                        if (card && questions) {
                            card.classList.add('is-revealed');
                            questions.classList.remove('active');
                        }
                    });
                } else if (scrollDiff < 0 && isGlobalTruth !== false) {
                    isGlobalTruth = false;
                    GAME_CONFIG.cards.forEach(c => {
                        const card = document.getElementById(`card-${c.id}`);
                        const questions = document.getElementById(`questions-${c.id}`);
                        if (card && questions) {
                            card.classList.remove('is-revealed');
                            if (!questions.classList.contains('active')) {
                                const randomQ = c.questions[Math.floor(Math.random() * c.questions.length)];
                                questions.innerHTML = `<p class="text-lg md:text-2xl text-gray-300 italic font-mono text-glow transition-all duration-500">? ${randomQ}</p>`;
                            }
                            questions.classList.add('active');
                        }
                    });
                }
                lastScrollY = currentScrollY;
            }
        });

        /* =======================================
           RESTART GAME (HIỆU ỨNG ĐIỆN ẢNH RÚT ĐIỆN TIVI)
        ======================================= */
        function restartGame() {
            // Ngăn cuộn trang, tắt đồng bộ scroll
            document.body.style.overflow = 'hidden';
            isClimaxCompleted = false; 

            // 1. Mờ dần toàn bộ văn bản và background (Chậm rãi, mất 2.5 giây)
            document.getElementById('global-header').style.opacity = '0';
            document.getElementById('global-main').style.opacity = '0';
            document.getElementById('bg-layer').classList.remove('active');
            document.querySelector('#finale-section > div').style.transition = 'opacity 2.5s ease-in-out';
            document.querySelector('#finale-section > div').style.opacity = '0';

            // Làm mờ luôn các text cạnh bài
            document.querySelectorAll('.opacity-transition').forEach(el => {
                el.style.transition = 'opacity 2.5s ease-in-out';
                el.style.opacity = '0';
            });

            // 2. Trích xuất các lá bài ra ngoài Body để không bị mờ theo nội dung
            const extractedCards = [];
            GAME_CONFIG.cards.forEach(c => {
                const card = document.getElementById(`card-${c.id}`);
                if (card) {
                    const rect = card.getBoundingClientRect();
                    document.body.appendChild(card); // Di dời bài ra ngoài

                    // Chốt chặt tọa độ bài hiện tại trên màn hình
                    card.style.transition = 'none';
                    card.style.position = 'fixed';
                    card.style.left = `${rect.left}px`;
                    card.style.top = `${rect.top}px`;
                    card.style.width = `${rect.width}px`;
                    card.style.height = `${rect.height}px`;
                    card.style.margin = '0';
                    card.style.zIndex = '9999';
                    card.style.transform = 'none'; 
                    card.classList.remove('clickable');
                    card.onclick = null;

                    extractedCards.push(card);
                }
            });

            void document.body.offsetWidth; // Ép trình duyệt reflow

            // 3. Rút bài lên trên (Thoát khỏi màn hình hiện tại)
            setTimeout(() => {
                extractedCards.forEach((card, i) => {
                    card.style.transition = 'top 2s cubic-bezier(0.5, 0, 0.2, 1), transform 2s ease-in';
                    card.style.top = '-300px'; 
                    card.style.transform = `rotate(${(i-1)*15}deg) scale(0.8)`;
                });
            }, 500);

            // 4. Chờ 3 giây để mọi thứ tối đen
            setTimeout(() => {
                // Tắt dây laser đỏ rụp một phát
                const stringsLayer = document.getElementById('strings-layer');
                stringsLayer.style.transition = 'opacity 0.3s ease-out';
                stringsLayer.style.opacity = '0';

                // 5. Cơn mưa bài rớt xuống từ trên nóc màn hình
                setTimeout(() => {
                    extractedCards.forEach((card, i) => {
                        // Trải đều bài ở trên cùng
                        card.style.transition = 'none';
                        card.style.top = '-200px';
                        card.style.left = `${20 + (i * 25)}vw`;
                        card.style.transform = `rotate(${Math.random() * 90}deg)`;

                        void card.offsetWidth; 

                        // Rớt thẳng đứng xuống vực
                        setTimeout(() => {
                            card.style.transition = 'top 3.5s cubic-bezier(0.4, 0, 0.8, 1), transform 3.5s linear';
                            card.style.top = '150vh'; 
                            card.style.transform = `rotate(${Math.random() * 720}deg)`; 
                        }, i * 400); 
                    });

                    // 6. Hiệu ứng rút điện Tivi CRT (White Dot Implosion)
                    setTimeout(() => {
                        const dotContainer = document.createElement('div');
                        dotContainer.id = 'white-dot-container';
                        dotContainer.innerHTML = '<div class="white-dot" id="the-white-dot"></div>';
                        document.body.appendChild(dotContainer);

                        const dot = document.getElementById('the-white-dot');

                        setTimeout(() => {
                            dot.classList.add('expand'); // Nở bung ánh sáng

                            setTimeout(() => {
                                dot.classList.remove('expand');
                                dot.classList.add('collapse'); // Sụp đổ tức thì

                                // 7. Khởi động lại hệ thống ở trong bóng tối
                                setTimeout(() => {
                                    dotContainer.remove();
                                    performActualReset();
                                    
                                    // Gỡ các thẻ rác vừa rớt
                                    extractedCards.forEach(c => c.remove());

                                }, 400); 
                            }, 2500); 
                        }, 100);

                    }, 2500); 
                }, 500); 
            }, 3000); 
        }

        function performActualReset() {
            document.body.style.overflow = '';
            
            // Phục hồi lại độ sáng
            document.getElementById('global-header').style.opacity = '1';
            document.getElementById('global-main').style.opacity = '1';
            document.getElementById('finale-section').classList.add('hidden');
            document.querySelector('#finale-section > div').style.opacity = '1';

            document.getElementById('sys-status').innerText = '[ HỆ THỐNG BẢO VỆ ĐANG HOẠT ĐỘNG ]';
            document.getElementById('sys-status').classList.replace('text-white', 'text-blood');
            document.getElementById('main-title').innerText = 'Sự Hoàn Hảo';
            document.getElementById('sub-title').innerText = 'Một thế giới lý tưởng đang chờ đón bạn';
            document.getElementById('sub-title').classList.replace('text-blood', 'text-gray-500');
            document.getElementById('title-line').classList.replace('bg-blood', 'bg-white');
            document.getElementById('title-line').style.boxShadow = 'none';

            document.getElementById('intro-text').innerHTML = '';
            document.getElementById('finale-text-container').innerHTML = '';
            
            const restartContainer = document.getElementById('restart-btn-container');
            restartContainer.style.opacity = '0';
            restartContainer.style.pointerEvents = 'none';

            document.getElementById('strings-layer').innerHTML = '';
            document.getElementById('strings-layer').style.opacity = '1';
            document.getElementById('strings-layer').style.transition = 'opacity 0.5s';

            currentStep = 0; iIndex = 0; cIndex = 0; isGlobalTruth = true;
            
            window.scrollTo({ top: 0, behavior: 'instant' });
            initializeGame(); 
            setTimeout(typeIntro, 800);
        }
    </script>
