<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series: Tâm Lý Tích Cực</title>
  <link href="/assets/css/tw.css" rel="stylesheet">
  <script>
    if (window.tailwind) {
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'primary-blue': '#1e40af',
              'accent-green': '#10b981',
              'accent-yellow': '#fcd34d'
            }
          }
        }
      };
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <link rel="icon" type="image/png" href="/image/tag.png">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b1220;
      background-image:
        radial-gradient(900px circle at 10% 10%, rgba(16, 185, 129, 0.12), transparent 55%),
        radial-gradient(700px circle at 90% 20%, rgba(30, 64, 175, 0.14), transparent 50%),
        radial-gradient(800px circle at 50% 100%, rgba(252, 211, 77, 0.08), transparent 55%);
      scroll-behavior: smooth;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .prose h1, .prose h2, .prose h3 { color: #0f172a; }
  </style>
  <script src="/assets/js/header.js"></script>
</head>
<body>
  <div class="min-h-screen flex flex-col items-center p-4 sm:p-8">
    <main class="w-full max-w-6xl bg-white/95 backdrop-blur shadow-2xl rounded-2xl p-6 md:p-12">
      <header class="text-center mb-8">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 text-blue-800 font-semibold text-sm border border-blue-100">
          <i data-lucide="book-open" class="w-5 h-5"></i>
          Series: Tâm Lý Tích Cực Trong Đời Sống Hiện Đại
        </div>
        <h1 class="mt-4 text-3xl sm:text-4xl font-extrabold text-slate-900">Nội dung chuyên sâu</h1>
        <p class="mt-2 text-slate-600">Biên tập từ tài liệu markdown riêng, hiển thị tối ưu cho đọc trên web.</p>
        <div class="h-1 w-24 bg-primary-blue mx-auto mt-5 rounded-full"></div>
      </header>

      <section class="rounded-xl border border-slate-200 bg-white p-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <aside class="lg:col-span-1">
            <div class="rounded-lg border border-slate-200 bg-slate-50 p-4">
              <div class="font-bold text-slate-900 mb-2">Mục lục</div>
              <nav class="space-y-2 text-sm">
                <a href="/positive-mindset/series/muc-tieu" class="block px-3 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100">Chương 1 — Mục tiêu</a>
                <a href="/positive-mindset/series/concept" class="block px-3 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100">Chương 2 — Concept</a>
                <a href="/positive-mindset/series/bai-tap" class="block px-3 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100">Chương 3 — Bài tập</a>
                <a href="/positive-mindset/series" class="block px-3 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100">Tổng quan</a>
              </nav>
            </div>
          </aside>
          <article class="lg:col-span-3">
            <div id="md_container" class="prose prose-slate max-w-none"></div>
          </article>
        </div>
      </section>

      <div class="mt-8 text-center">
        <a href="/positive-mindset" class="inline-flex items-center gap-2 px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg hover:bg-blue-700 transition focus:outline-none focus:ring-4 focus:ring-blue-500">
          <i data-lucide="home" class="w-5 h-5"></i>
          Về Trang chủ chủ đề
        </a>
      </div>
    </main>
  </div>

  <script>
    function getQuery(name){
      var url = new URL(window.location.href);
      return url.searchParams.get(name);
    }
    function mapChapter(slug){
      if (slug === 'muc-tieu') return '/Positive-mindset/chapters/01-muc-tieu.md';
      if (slug === 'concept') return '/Positive-mindset/chapters/02-concept.md';
      if (slug === 'bai-tap') return '/Positive-mindset/chapters/03-bai-tap.md';
      return '/Positive-mindset/chapters/00-tong-quan.md';
    }
    function renderMarkdown(text){
      var md = window.markdownit({ html: false, linkify: true, typographer: true });
      document.getElementById('md_container').innerHTML = md.render(text);
      if (window.lucide) lucide.createIcons();
    }
    function loadMarkdown(){
      var slug = getQuery('chapter');
      var path = mapChapter(slug);
      fetch(path).then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        return r.text();
      }).then(renderMarkdown).catch(function(){
        document.getElementById('md_container').innerHTML =
          '<div class="rounded-lg bg-rose-50 border border-rose-200 p-4 text-rose-700">Không thể tải nội dung chuyên sâu. Vui lòng kiểm tra lại tệp markdown.</div>';
      });
    }
    document.addEventListener('DOMContentLoaded', function(){
      if (window.lucide) lucide.createIcons();
      loadMarkdown();
    });
  </script>
  <script src="/assets/js/footer.js"></script>
</body>
</html>
