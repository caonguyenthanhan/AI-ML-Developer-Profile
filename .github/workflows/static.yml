# Simple workflow for deploying static content to GitHub Pages
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci"
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build CSS
        run: npm run build:css
      - name: Prettier
        run: npm run format:check
      - name: Validate JSON
        run: node -e "const fs=require('fs');const path=require('path');const roots=['vercel.json','package.json','public/data'];const files=[];const add=(p)=>{if(!fs.existsSync(p))return;const st=fs.statSync(p);if(st.isFile()&&p.toLowerCase().endsWith('.json')){files.push(p);return;}if(st.isDirectory()){for(const name of fs.readdirSync(p)){add(path.join(p,name));}}};for(const r of roots)add(r);let ok=true;for(const f of files){try{JSON.parse(fs.readFileSync(f,'utf8'));}catch(e){ok=false;console.error('Invalid JSON:',f,String(e&&e.message||e));}}if(!ok)process.exit(1);console.log('JSON OK:',files.length);"
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python compile
        run: python -m compileall -q .
